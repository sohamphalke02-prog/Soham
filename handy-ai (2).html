<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Handy AI — Gesture Intelligence Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#7cffc4;--accent2:#ff6bca;--accent3:#6bb5ff;
  --bg:#03020a;--glass:rgba(255,255,255,0.06);--glass-border:rgba(255,255,255,0.12);
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:#fff;font-family:'DM Mono',monospace;touch-action:none;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
#grain{position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.025}
#top-stripe{position:fixed;top:0;left:0;right:0;height:2px;z-index:1000;transition:background .5s;background:var(--accent)}
video{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.35);z-index:1;transform:scaleX(-1)}
video.rear{transform:scaleX(1)}
canvas{position:fixed;inset:0;width:100%;height:100%}
#bgCanvas{z-index:2}
#fxCanvas{z-index:3;mix-blend-mode:screen}
#drawCanvas{z-index:4}
#topbar{position:fixed;top:env(safe-area-inset-top,12px);left:50%;transform:translateX(-50%);z-index:100;display:flex;align-items:center;gap:8px;background:var(--glass);border:1px solid var(--glass-border);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:50px;padding:8px 14px;white-space:nowrap;max-width:calc(100vw - 16px);overflow-x:auto;scrollbar-width:none}
#topbar::-webkit-scrollbar{display:none}
#cam-flip-btn{font-size:.8rem;background:var(--glass);border:1px solid var(--glass-border);color:rgba(255,255,255,.7);border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0}
#cam-flip-btn:active{transform:scale(.9);background:rgba(255,255,255,.15)}
.brand{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.badge{font-size:.55rem;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:20px;padding:2px 7px;color:rgba(255,255,255,.7);vertical-align:middle;font-family:'DM Mono',monospace;margin-left:4px;-webkit-text-fill-color:rgba(255,255,255,.7)}
.mode-switcher{display:flex;gap:4px;background:rgba(0,0,0,.3);border-radius:50px;padding:3px}
.mode-btn{font-family:'DM Mono',monospace;font-size:.7rem;border:none;background:transparent;color:rgba(255,255,255,.5);cursor:pointer;border-radius:50px;padding:5px 12px;transition:all .25s;display:flex;align-items:center;gap:5px}
.mode-btn.active{background:rgba(255,255,255,.12);color:#fff}
.mode-btn.active.play{box-shadow:0 0 10px rgba(124,255,196,.4);color:var(--accent)}
.mode-btn.active.shapes{box-shadow:0 0 10px rgba(255,107,202,.4);color:var(--accent2)}
.mode-btn.active.write{box-shadow:0 0 10px rgba(107,181,255,.4);color:var(--accent3)}
.chip{font-size:.65rem;background:var(--glass);border:1px solid var(--glass-border);backdrop-filter:blur(8px);border-radius:20px;padding:4px 10px;display:flex;align-items:center;gap:5px}
.chip-dot{width:7px;height:7px;border-radius:50%;background:#888;transition:background .3s}
.chip-dot.live{background:#7cffc4;box-shadow:0 0 6px #7cffc4}
#bottom-hud{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 20px);left:50%;transform:translateX(-50%);z-index:100;background:var(--glass);border:1px solid var(--glass-border);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:50px;padding:8px 18px;font-size:.75rem;display:flex;align-items:center;gap:8px;transition:all .3s}
#gesture-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
#help-panel{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 20px);right:max(env(safe-area-inset-right,0px),20px);z-index:100;background:var(--glass);border:1px solid var(--glass-border);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:16px;padding:14px 16px;width:190px;font-size:.65rem;line-height:1.7;color:rgba(255,255,255,.65)}
#help-panel h4{font-family:'Syne',sans-serif;font-size:.75rem;color:#fff;margin-bottom:6px}
#clear-btn{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 62px);right:max(env(safe-area-inset-right,0px),20px);z-index:100;display:none;background:rgba(107,181,255,.15);border:1px solid rgba(107,181,255,.4);color:var(--accent3);font-family:'DM Mono',monospace;font-size:.65rem;border-radius:20px;padding:6px 14px;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
#clear-btn:hover{background:rgba(107,181,255,.3)}
#shake-ring{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 110px);right:max(env(safe-area-inset-right,0px),28px);z-index:100;display:none;width:46px;height:46px}
#toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.85);z-index:200;font-family:'Syne',sans-serif;font-size:clamp(1.5rem,6vw,2.5rem);font-weight:800;text-align:center;pointer-events:none;opacity:0;transition:all .15s cubic-bezier(.34,1.56,.64,1);width:90vw}
#toast.show{opacity:1;transform:translate(-50%,-50%) scale(1)}

#splash{position:fixed;inset:0;z-index:500;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .8s}
#splash.hide{opacity:0;pointer-events:none}
.splash-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(3rem,8vw,5.5rem);background:linear-gradient(90deg,var(--accent),var(--accent3),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1}
.splash-sub{font-size:.65rem;letter-spacing:.2em;color:rgba(255,255,255,.4);text-transform:uppercase}
.rings{position:relative;width:200px;height:200px;display:flex;align-items:center;justify-content:center;margin:10px 0}
.ring{position:absolute;border-radius:50%;border:1.5px solid;animation:ring-pulse 2.4s ease-in-out infinite}
.ring:nth-child(1){width:80px;height:80px;border-color:rgba(124,255,196,.6);animation-delay:0s}
.ring:nth-child(2){width:130px;height:130px;border-color:rgba(107,181,255,.4);animation-delay:.4s}
.ring:nth-child(3){width:180px;height:180px;border-color:rgba(255,107,202,.3);animation-delay:.8s}
@keyframes ring-pulse{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.08);opacity:.3}}
.pills{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.pill{font-size:.65rem;border:1px solid rgba(255,255,255,.15);border-radius:30px;padding:6px 14px;background:rgba(255,255,255,.05);color:rgba(255,255,255,.7)}
.cta{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;background:linear-gradient(135deg,rgba(124,255,196,.2),rgba(107,181,255,.2));border:1px solid var(--accent);color:var(--accent);border-radius:50px;padding:14px 36px;cursor:pointer;transition:all .3s;box-shadow:0 0 20px rgba(124,255,196,.2)}
.cta:hover{box-shadow:0 0 35px rgba(124,255,196,.4);transform:scale(1.03)}
.cta-note{font-size:.6rem;color:rgba(255,255,255,.3)}
@media(max-width:600px){.mode-btn span.label{display:none}.pills{flex-direction:column;align-items:center}#help-panel{width:150px;font-size:.6rem}#topbar{gap:6px;padding:6px 10px}}
</style>
</head>
<body>

<svg id="grain" width="100%" height="100%">
  <filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
  <rect width="100%" height="100%" filter="url(#noise)"/>
</svg>

<div id="top-stripe"></div>

<!-- SPLASH: normal entry -->
<div id="splash">
  <div id="splash-main">
    <div style="display:flex;flex-direction:column;align-items:center;gap:20px">
      <div class="splash-logo">Handy AI</div>
      <div class="splash-sub">Gesture Intelligence Platform</div>
      <div class="rings"><div class="ring"></div><div class="ring"></div><div class="ring"></div></div>
      <div class="pills">
        <div class="pill">Real-time Tracking</div>
        <div class="pill">Gesture Physics</div>
        <div class="pill">Air Drawing</div>
      </div>
      <button class="cta" id="enter-btn">Enter Experience</button>
      <div class="cta-note" id="proto-check">Checking environment…</div>
    </div>
  </div>

  <!-- Permission denied / blocked guide -->
  <div id="splash-denied" style="display:none;flex-direction:column;align-items:center;gap:16px;padding:24px;max-width:360px;text-align:center">
    <div style="font-size:3rem">📵</div>
    <div class="splash-logo" style="font-size:2rem">Camera Blocked</div>
    <div style="font-size:.8rem;color:rgba(255,255,255,.55);line-height:1.8" id="denied-reason"></div>
    <div style="width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:16px;font-size:.72rem;line-height:2;color:rgba(255,255,255,.7);text-align:left" id="fix-steps"></div>
    <button class="cta" style="font-size:.9rem;padding:12px 28px" onclick="location.reload()">↺ Reload &amp; Try Again</button>
    <div class="cta-note">Must be served over HTTPS · Use Chrome on Android</div>
  </div>
</div>

<video id="vid" autoplay playsinline muted></video>
<canvas id="bgCanvas"></canvas>
<canvas id="fxCanvas"></canvas>
<canvas id="drawCanvas"></canvas>

<div id="topbar">
  <span class="brand">Handy AI</span><span class="badge">Beta</span>
  <div class="mode-switcher">
    <button class="mode-btn play active" data-mode="play">▶ <span class="label">Play</span></button>
    <button class="mode-btn shapes" data-mode="shapes">♥ <span class="label">Shapes</span></button>
    <button class="mode-btn write" data-mode="write">✏ <span class="label">Write</span></button>
  </div>
  <div class="chip"><div class="chip-dot" id="cam-dot"></div><span id="fps-chip">0 fps</span></div>
  <div class="chip">✋ <span id="hand-chip">0</span></div>
  <button id="cam-flip-btn" title="Flip Camera">⟳</button>
</div>

<div id="bottom-hud"><div id="gesture-dot"></div><span id="gesture-label">Waiting...</span></div>

<div id="help-panel">
  <h4>Tips</h4>
  <div id="help-text"></div>
</div>

<button id="clear-btn" onclick="clearDrawing()">🗑 Clear Canvas</button>

<svg id="shake-ring" viewBox="0 0 46 46" fill="none">
  <circle cx="23" cy="23" r="20" stroke="rgba(255,255,255,.15)" stroke-width="3"/>
  <circle id="shake-progress" cx="23" cy="23" r="20" stroke="var(--accent3)" stroke-width="3" stroke-dasharray="125.6" stroke-dashoffset="125.6" stroke-linecap="round" transform="rotate(-90 23 23)" style="transition:all .2s"/>
</svg>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
const MODES = ['play','shapes','write'];
let mode = 'play';
let hands = [];
let particles = [], ripples = [];
let drawPaths = [], activePath = null, penDown = false;
let fpsCount = 0, fps = 0, lastFpsTime = performance.now();
let audioCtx = null, humOsc = null, humGain = null;
let toastTimer = null;
let shakeHistory = [], shakeReversals = 0, lastShakeDir = 0, shakeCooldown = false;
let prevWristX = null;
let modeAccent = {'play':'#7cffc4','shapes':'#ff6bca','write':'#6bb5ff'};
let hueShift = 0;
let matrixCols = [], matrixChars = [], matrixSpeeds = [], matrixY = [], matrixHue = 0;
let handVelocity = 0, prevHandPos = null;

const vid = document.getElementById('vid');
const bgC = document.getElementById('bgCanvas');
const fxC = document.getElementById('fxCanvas');
const dwC = document.getElementById('drawCanvas');
const bgX = bgC.getContext('2d');
const fxX = fxC.getContext('2d');
const dwX = dwC.getContext('2d');

function resize(){
  [bgC,fxC,dwC].forEach(c=>{c.width=innerWidth;c.height=innerHeight});
  initMatrix();
}
window.addEventListener('resize',resize);

function initMatrix(){
  const cols = Math.floor(innerWidth/15);
  matrixCols = cols;
  matrixY = Array.from({length:cols},()=>Math.random()*innerHeight);
  matrixSpeeds = Array.from({length:cols},()=>1+Math.random()*2);
  matrixChars = Array.from({length:cols},()=>String.fromCharCode(0x30A0+Math.floor(Math.random()*96)));
}

function katakana(){return String.fromCharCode(0x30A0+Math.floor(Math.random()*96))}

function drawMatrix(){
  const speed = 1+handVelocity*0.04;
  const fade = Math.min(0.18, 0.12+handVelocity*0.003);
  bgX.globalCompositeOperation='destination-out';
  bgX.fillStyle=`rgba(0,0,0,${fade})`;
  bgX.fillRect(0,0,bgC.width,bgC.height);
  bgX.globalCompositeOperation='source-over';
  bgX.font='15px DM Mono,monospace';
  for(let i=0;i<matrixCols;i++){
    const hue = (matrixHue+i*3)%360;
    bgX.fillStyle=`hsl(${hue},100%,60%)`;
    if(Math.random()<.05) matrixChars[i]=katakana();
    bgX.fillText(matrixChars[i],i*15,matrixY[i]);
    matrixY[i]+=matrixSpeeds[i]*speed;
    if(matrixY[i]>bgC.height+15) matrixY[i]=-15;
  }
  matrixHue=(matrixHue+0.3)%360;
}

function initAudio(){
  if(audioCtx) return;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
}

function playZap(){
  if(!audioCtx) return;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  o.type='sawtooth'; o.frequency.setValueAtTime(700,audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(30,audioCtx.currentTime+.12);
  g.gain.setValueAtTime(.3,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.12);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime+.12);
}

function playPop(){
  if(!audioCtx) return;
  const o=audioCtx.createOscillator(), g=audioCtx.createGain();
  const f=300+Math.random()*200;
  o.type='sine'; o.frequency.setValueAtTime(f,audioCtx.currentTime);
  o.frequency.exponentialRampToValueAtTime(f*.5,audioCtx.currentTime+.08);
  g.gain.setValueAtTime(.25,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.08);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime+.08);
}

function startHum(){
  if(!audioCtx||humOsc) return;
  humOsc=audioCtx.createOscillator(); humGain=audioCtx.createGain();
  humOsc.type='sine'; humOsc.frequency.value=120;
  humGain.gain.value=0;
  humOsc.connect(humGain); humGain.connect(audioCtx.destination);
  humOsc.start();
}

function stopHum(){
  if(!humOsc) return;
  humGain.gain.setTargetAtTime(0,audioCtx.currentTime,.1);
  setTimeout(()=>{try{humOsc.stop();humOsc.disconnect();}catch(e){}humOsc=null;humGain=null;},200);
}

function setHum(dist){
  if(!humOsc) startHum();
  if(!humOsc) return;
  const f=80+dist*280; humOsc.frequency.setTargetAtTime(f,audioCtx.currentTime,.05);
  const g=Math.max(0,0.15-(dist-.1)*.3); humGain.gain.setTargetAtTime(g,audioCtx.currentTime,.05);
}

function showToast(txt){
  clearTimeout(toastTimer);
  const el=document.getElementById('toast');
  el.textContent=txt; el.style.color=modeAccent[mode];
  el.classList.add('show');
  toastTimer=setTimeout(()=>el.classList.remove('show'),1600);
}

function setGesture(txt){
  document.getElementById('gesture-label').textContent=txt;
  document.getElementById('gesture-dot').style.background=modeAccent[mode];
}

function clearDrawing(){
  dwX.clearRect(0,0,dwC.width,dwC.height);
  drawPaths=[]; activePath=null; penDown=false;
  playPop(); showToast('🌊 Canvas cleared');
  shakeCooldown=true; shakeReversals=0; updateShakeRing(0);
  setTimeout(()=>shakeCooldown=false,2000);
}

function updateShakeRing(prog){
  const circ=125.6; const el=document.getElementById('shake-progress');
  const off=circ*(1-prog);
  el.style.strokeDashoffset=off;
  const hue=220+prog*60;
  el.style.stroke=`hsl(${hue},100%,65%)`;
}

function spawnParticles(x,y,count,color){
  for(let i=0;i<count;i++){
    const ang=Math.random()*Math.PI*2, spd=2+Math.random()*5;
    particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-2,life:45,maxLife:45,color:color||`hsl(${Math.random()*360},100%,70%)`});
  }
}

function spawnRipple(x,y,color){
  ripples.push({x,y,r:0,maxR:80,life:1,color:color||'#fff'});
}

function lm(hand,idx){return hand.landmarks[idx]}
function lmX(hand,idx){return lm(hand,idx).x*innerWidth}
function lmY(hand,idx){return lm(hand,idx).y*innerHeight}

function dist2D(a,b){return Math.hypot(a.x-b.x,a.y-b.y)}

function normDist(hand,a,b){return Math.hypot(lm(hand,a).x-lm(hand,b).x,lm(hand,a).y-lm(hand,b).y)}

function fingerSpread(hand){
  const tips=[4,8,12,16,20];
  let max=0;
  for(let i=0;i<tips.length;i++)for(let j=i+1;j<tips.length;j++)
    max=Math.max(max,normDist(hand,tips[i],tips[j]));
  return max;
}

function fingerExtended(hand,tip,base){return normDist(hand,tip,0)>normDist(hand,base,0)}

function isPinch(hand,thresh=0.055){return normDist(hand,4,8)<thresh}

function renderSkeleton(hand, hue){
  const conns=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]];
  fxX.lineWidth=2;
  conns.forEach(([a,b])=>{
    const ax=lmX(hand,a),ay=lmY(hand,a),bx=lmX(hand,b),by=lmY(hand,b);
    const grad=fxX.createLinearGradient(ax,ay,bx,by);
    grad.addColorStop(0,`hsla(${hue},100%,70%,.8)`);
    grad.addColorStop(1,`hsla(${(hue+40)%360},100%,70%,.8)`);
    fxX.strokeStyle=grad; fxX.beginPath(); fxX.moveTo(ax,ay); fxX.lineTo(bx,by); fxX.stroke();
  });
  [4,8,12,16,20].forEach(i=>{
    const x=lmX(hand,i),y=lmY(hand,i);
    fxX.beginPath(); fxX.arc(x,y,6,0,Math.PI*2);
    fxX.fillStyle=`hsla(${hue},100%,80%,.9)`; fxX.fill();
    fxX.shadowBlur=12; fxX.shadowColor=`hsl(${hue},100%,60%)`; fxX.fill(); fxX.shadowBlur=0;
  });
}

function lightning(x1,y1,x2,y2,color){
  fxX.beginPath(); fxX.moveTo(x1,y1);
  const segs=8, dx=(x2-x1)/segs, dy=(y2-y1)/segs;
  for(let i=1;i<segs;i++){
    fxX.lineTo(x1+dx*i+(Math.random()-.5)*30,y1+dy*i+(Math.random()-.5)*30);
  }
  fxX.lineTo(x2,y2);
  fxX.strokeStyle=color||'#fff'; fxX.lineWidth=2; fxX.stroke();
}

function drawHeart(cx,cy,size,t){
  fxX.save(); fxX.translate(cx,cy); const sc=1+Math.sin(t*3)*.05; fxX.scale(sc,sc);
  fxX.beginPath();
  for(let i=0;i<=360;i++){
    const rad=i*Math.PI/180;
    const x=(16*Math.pow(Math.sin(rad),3))*size;
    const y=-(13*Math.cos(rad)-5*Math.cos(2*rad)-2*Math.cos(3*rad)-Math.cos(4*rad))*size;
    i===0?fxX.moveTo(x,y):fxX.lineTo(x,y);
  }
  fxX.closePath();
  const grad=fxX.createRadialGradient(0,-size*.3,size*.1,0,0,size*1.5);
  grad.addColorStop(0,'rgba(255,150,200,0.95)'); grad.addColorStop(1,'rgba(255,50,150,0.6)');
  fxX.fillStyle=grad; fxX.fill();
  fxX.strokeStyle='#ff6bca'; fxX.lineWidth=2; fxX.shadowBlur=20; fxX.shadowColor='#ff6bca'; fxX.stroke();
  fxX.shadowBlur=0; fxX.restore();
}

function drawPeace(cx,cy,r){
  fxX.save(); fxX.translate(cx,cy);
  fxX.beginPath(); fxX.arc(0,0,r,0,Math.PI*2);
  fxX.strokeStyle='#ff6bca'; fxX.lineWidth=3; fxX.shadowBlur=15; fxX.shadowColor='#ff6bca'; fxX.stroke();
  [[0,-r,0,r],[0,0,-r*Math.cos(Math.PI/6),r*Math.sin(Math.PI/6)],[0,0,r*Math.cos(Math.PI/6),r*Math.sin(Math.PI/6)]].forEach(([x1,y1,x2,y2])=>{
    fxX.beginPath(); fxX.moveTo(x1,y1); fxX.lineTo(x2,y2); fxX.stroke();
  });
  fxX.shadowBlur=0; fxX.restore();
}

function drawStar(cx,cy,r,rot){
  fxX.save(); fxX.translate(cx,cy); fxX.rotate(rot);
  fxX.beginPath();
  for(let i=0;i<8;i++){
    const a=i*Math.PI/4, a2=a+Math.PI/8;
    const x1=Math.cos(a)*r,y1=Math.sin(a)*r;
    const x2=Math.cos(a2)*r*.45,y2=Math.sin(a2)*r*.45;
    i===0?fxX.moveTo(x1,y1):fxX.lineTo(x1,y1);
    fxX.lineTo(x2,y2);
  }
  fxX.closePath();
  const grad=fxX.createRadialGradient(0,0,0,0,0,r);
  grad.addColorStop(0,'rgba(255,255,255,1)'); grad.addColorStop(.4,'rgba(255,215,0,.8)'); grad.addColorStop(1,'rgba(255,215,0,0)');
  fxX.fillStyle=grad; fxX.fill(); fxX.restore();
}

function drawMandala(tips){
  if(tips.length<2) return;
  const cx=tips.reduce((s,p)=>s+p.x,0)/tips.length;
  const cy=tips.reduce((s,p)=>s+p.y,0)/tips.length;
  fxX.save();
  for(let i=0;i<tips.length;i++){
    for(let j=i+1;j<tips.length;j++){
      const hue=(hueShift+i*36)%360;
      fxX.strokeStyle=`hsla(${hue},100%,70%,.4)`; fxX.lineWidth=1;
      fxX.beginPath(); fxX.moveTo(tips[i].x,tips[i].y); fxX.lineTo(tips[j].x,tips[j].y); fxX.stroke();
    }
  }
  tips.forEach((p,i)=>{
    const hue=(hueShift+i*36)%360;
    fxX.strokeStyle=`hsl(${hue},100%,70%)`; fxX.lineWidth=1;
    fxX.beginPath(); fxX.moveTo(cx,cy); fxX.lineTo(p.x,p.y); fxX.stroke();
  });
  fxX.restore();
}

let pinchCooldown = false, shapeCooldown = false;
let shapeState = {heart:false,peace:false,star:false};
let starRot = 0;
let globalT = 0;

function processHands(){
  globalT += 0.016;
  hueShift = (hueShift+0.5)%360;
  starRot += 0.03;

  fxX.clearRect(0,0,fxC.width,fxC.height);
  fxX.globalCompositeOperation='screen';

  const h0=hands[0], h1=hands[1];
  document.getElementById('hand-chip').textContent=hands.length;
  document.getElementById('cam-dot').className='chip-dot live';

  if(mode==='play') doPlayMode(h0,h1);
  else if(mode==='shapes') doShapesMode(h0,h1);
  else if(mode==='write') doWriteMode(h0);

  updateHandVelocity(h0);
  updateParticles();
  updateRipples();
}

function updateHandVelocity(hand){
  if(!hand){handVelocity*=.9;prevHandPos=null;return;}
  const wx=lmX(hand,0),wy=lmY(hand,0);
  if(prevHandPos){
    handVelocity=Math.hypot(wx-prevHandPos.x,wy-prevHandPos.y);
  }
  prevHandPos={x:wx,y:wy};
}

function doPlayMode(h0,h1){
  if(!h0){setGesture('Show a hand...');if(humOsc)stopHum();return;}
  const hue=(hueShift)%360;
  renderSkeleton(h0,hue);

  [4,8,12,16,20].forEach(i=>{
    const x=lmX(h0,i),y=lmY(h0,i);
    if(Math.random()<.3) spawnParticles(x,y,1,`hsl(${(hue+Math.random()*60)}%,100%,70%)`);
  });

  if(isPinch(h0) && !pinchCooldown){
    pinchCooldown=true; setTimeout(()=>pinchCooldown=false,500);
    const px=lmX(h0,4)+(lmX(h0,8)-lmX(h0,4))*.5;
    const py=lmY(h0,4)+(lmY(h0,8)-lmY(h0,4))*.5;
    spawnRipple(px,py,'#7cffc4'); spawnParticles(px,py,12,'#7cffc4');
    playZap(); showToast('⚡ Pinch'); setGesture('⚡ Pinch');
  } else if(!isPinch(h0)){setGesture('Wiggle fingers!');}

  if(h1){
    renderSkeleton(h1,(hue+120)%360);
    [4,8,12,16,20].forEach(i=>{if(Math.random()<.3)spawnParticles(lmX(h1,i),lmY(h1,i),1);});
    const tips0=[4,8,12,16,20].map(i=>({x:lmX(h0,i),y:lmY(h0,i)}));
    const tips1=[4,8,12,16,20].map(i=>({x:lmX(h1,i),y:lmY(h1,i)}));
    tips0.forEach((p,i)=>{
      const g=fxX.createLinearGradient(p.x,p.y,tips1[i].x,tips1[i].y);
      g.addColorStop(0,`hsla(${hue},100%,70%,.5)`); g.addColorStop(1,`hsla(${(hue+120)%360},100%,70%,.5)`);
      fxX.strokeStyle=g; fxX.lineWidth=1.5; fxX.beginPath(); fxX.moveTo(p.x,p.y); fxX.lineTo(tips1[i].x,tips1[i].y); fxX.stroke();
      if(dist2D(p,tips1[i])<140) lightning(p.x,p.y,tips1[i].x,tips1[i].y,`hsl(${hue},100%,90%)`);
    });
    const allTips=[...tips0,...tips1]; drawMandala(allTips);
    const wdist=Math.hypot(lmX(h0,0)-lmX(h1,0),lmY(h0,0)-lmY(h1,0))/Math.max(innerWidth,innerHeight);
    setHum(wdist); setGesture('Two-hand mode!');
  } else {if(humOsc)stopHum();}
}

function doShapesMode(h0,h1){
  if(!h0||!h1){setGesture('Show both hands');shapeState={heart:false,peace:false,star:false};return;}
  const palmdist=Math.hypot(lm(h0,0).x-lm(h1,0).x,lm(h0,0).y-lm(h1,0).y);
  const sp0=fingerSpread(h0), sp1=fingerSpread(h1);
  const cx=(lmX(h0,0)+lmX(h1,0))*.5, cy=(lmY(h0,0)+lmY(h1,0))*.5;

  const heartCond=palmdist<.35&&sp0>.09&&sp1>.09;
  const starCond=sp0<.09&&sp1<.09;
  const peaceCond=normDist(h0,8,0)>.18&&normDist(h0,12,0)>.18&&normDist(h0,16,0)<.16&&normDist(h0,20,0)<.16;

  if(heartCond){
    drawHeart(cx,cy,14,globalT);
    setGesture('♥ Heart');
    if(!shapeState.heart){shapeState.heart=true;playPop();showToast('♥ Heart');}
    shapeState.peace=shapeState.star=false;
  } else if(starCond&&!shapeCooldown){
    drawStar(cx,cy,120,starRot);
    setGesture('💥 Star Burst!');
    if(!shapeState.star){
      shapeState.star=true;spawnParticles(cx,cy,25,'#ffd700');
      playZap();showToast('💥 Star Burst!');shapeCooldown=true;setTimeout(()=>shapeCooldown=false,1000);
    }
    shapeState.heart=shapeState.peace=false;
  } else if(peaceCond){
    drawPeace(cx-80,cy,50);
    setGesture('✌ Peace');
    if(!shapeState.peace){shapeState.peace=true;playPop();showToast('✌ Peace');}
    shapeState.heart=shapeState.star=false;
  } else {
    shapeState={heart:false,peace:false,star:false};
    setGesture('Try a gesture!');
  }
}

let pathHue=0;
function doWriteMode(hand){
  if(!hand){setGesture('Show your hand');return;}
  const ix=lmX(hand,8),iy=lmY(hand,8);
  const pinch=normDist(hand,4,8)<.06;
  const extended=normDist(hand,8,0)>.17&&!pinch;

  drawPaths.forEach(path=>{
    if(path.points.length<2) return;
    dwX.save(); dwX.globalCompositeOperation='source-over';
    dwX.strokeStyle=`hsl(${path.hue},100%,65%)`; dwX.lineWidth=4.5;
    dwX.lineCap='round'; dwX.lineJoin='round';
    dwX.shadowBlur=10; dwX.shadowColor=`hsl(${path.hue},100%,50%)`;
    dwX.beginPath(); dwX.moveTo(path.points[0].x,path.points[0].y);
    for(let i=1;i<path.points.length-1;i++){
      const mx=(path.points[i].x+path.points[i+1].x)*.5;
      const my=(path.points[i].y+path.points[i+1].y)*.5;
      dwX.quadraticCurveTo(path.points[i].x,path.points[i].y,mx,my);
    }
    dwX.stroke(); dwX.restore();
  });

  if(extended&&!penDown){penDown=true;pathHue=(pathHue+30)%360;activePath={hue:pathHue,points:[{x:ix,y:iy}]};drawPaths.push(activePath);}
  if(extended&&penDown&&activePath){activePath.points.push({x:ix,y:iy});}
  if(!extended){penDown=false;activePath=null;}

  fxX.save(); fxX.globalCompositeOperation='source-over';
  if(extended){
    fxX.beginPath(); fxX.arc(ix,iy,10,0,Math.PI*2);
    const p=globalT*3; fxX.strokeStyle=`hsl(${(p*50)%360},100%,70%)`;
    fxX.lineWidth=2; fxX.shadowBlur=12; fxX.shadowColor=`hsl(${(p*50)%360},100%,60%)`; fxX.stroke();
    fxX.beginPath(); fxX.arc(ix,iy,14+Math.sin(p)*2,0,Math.PI*2);
    fxX.strokeStyle=`hsla(${(p*50)%360},100%,70%,.4)`; fxX.lineWidth=1; fxX.stroke();
    setGesture('✏ Drawing...');
  } else {setGesture(pinch?'Pen up':'Lift index to draw');}
  fxX.restore();

  if(!shakeCooldown){
    const wrist=lm(hand,0).x*innerWidth;
    if(prevWristX!==null){
      const dx=wrist-prevWristX;
      const dir=dx>3?1:dx<-3?-1:0;
      if(dir!==0&&dir!==lastShakeDir){shakeReversals++;lastShakeDir=dir;}
      shakeHistory.push(dir); if(shakeHistory.length>30)shakeHistory.shift();
    }
    prevWristX=wrist;
    const prog=Math.min(1,shakeReversals/6); updateShakeRing(prog);
    if(shakeReversals>=6){clearDrawing();shakeReversals=0;shakeHistory=[];prevWristX=null;}
  }
}

function updateParticles(){
  particles=particles.filter(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=.15; p.life--;
    const a=p.life/p.maxLife;
    const r=4*a;
    fxX.beginPath(); fxX.arc(p.x,p.y,r,0,Math.PI*2);
    fxX.fillStyle=p.color.replace(')',`,${a})`).replace('hsl','hsla'); fxX.fill();
    return p.life>0;
  });
}

function updateRipples(){
  ripples=ripples.filter(r=>{
    r.r+=(r.maxR-r.r)*.12; r.life-=.035;
    const a=r.life;
    fxX.beginPath(); fxX.arc(r.x,r.y,r.r,0,Math.PI*2);
    fxX.strokeStyle=`rgba(255,255,255,${a*.5})`; fxX.lineWidth=2; fxX.stroke();
    fxX.beginPath(); fxX.arc(r.x,r.y,r.r*.7,0,Math.PI*2);
    fxX.strokeStyle=`rgba(255,255,255,${a*.3})`; fxX.lineWidth=1; fxX.stroke();
    return r.life>0;
  });
}

function setMode(m){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.mode-btn.${m}`).classList.add('active');
  document.getElementById('top-stripe').style.background=modeAccent[m];
  document.getElementById('gesture-dot').style.background=modeAccent[m];
  document.getElementById('clear-btn').style.display=m==='write'?'block':'none';
  document.getElementById('shake-ring').style.display=m==='write'?'block':'none';
  shapeState={heart:false,peace:false,star:false};
  shakeReversals=0; updateShakeRing(0);
  if(m!=='write'){dwX.clearRect(0,0,dwC.width,dwC.height);drawPaths=[];activePath=null;penDown=false;}
  if(humOsc&&m!=='play')stopHum();
  const tips={'play':'Pinch fingers to zap!<br>Use two hands for mandala + lightning.','shapes':'HEART: bring palms close, fingers open<br>PEACE: index+middle up, rest down<br>STAR: both fists closed','write':'Point index to draw<br>Pinch = pen up<br>Shake hand to clear!'};
  document.getElementById('help-text').innerHTML=tips[m];
}

document.querySelectorAll('.mode-btn').forEach(b=>b.addEventListener('click',()=>setMode(b.dataset.mode)));

let handsInstance, mpCamera, pumpRunning = false;
let currentFacingMode = 'user';
let cameraStream = null;

// Progressive constraint fallback chain — from strictest to bare minimum
async function startCamera(facingMode){
  if(cameraStream){cameraStream.getTracks().forEach(t=>t.stop());cameraStream=null;}

  const chains = [
    // 1. Ideal resolution + facing
    {video:{facingMode:{ideal:facingMode},width:{ideal:1280},height:{ideal:720},frameRate:{ideal:30}}},
    // 2. Exact facing, no resolution
    {video:{facingMode:{exact:facingMode}}},
    // 3. Ideal facing only (no exact — avoids OverconstrainedError on some Androids)
    {video:{facingMode:facingMode}},
    // 4. Any camera — bare minimum, always works if permission is granted
    {video:true}
  ];

  let lastErr = null;
  for(const c of chains){
    try{
      cameraStream = await navigator.mediaDevices.getUserMedia(c);
      vid.srcObject = cameraStream;
      vid.classList.toggle('rear', facingMode==='environment');
      await new Promise((res,rej)=>{vid.onloadedmetadata=res; vid.onerror=rej;});
      await vid.play();
      return true;
    }catch(e){
      lastErr = e;
      // NotAllowedError / PermissionDeniedError = user blocked camera — no point retrying
      if(e.name==='NotAllowedError'||e.name==='PermissionDeniedError') break;
    }
  }
  showCameraError(lastErr);
  return false;
}

// ── Pre-flight: check protocol & permissions API before user even taps ──
(async function preflight(){
  const note = document.getElementById('proto-check');
  const isSecure = location.protocol==='https:' || location.hostname==='localhost' || location.hostname==='127.0.0.1';
  if(!isSecure){
    showDenied(
      'This page is not served over HTTPS.',
      'Camera access requires a secure connection.',
      [
        '1. Host this file on a server with HTTPS',
        '2. Options: GitHub Pages, Netlify, Vercel (all free)',
        '3. Or use localhost for local testing',
        '4. file:// URLs will NEVER work for camera'
      ]
    );
    return;
  }
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    showDenied(
      'Your browser does not support camera access.',
      'WebRTC / getUserMedia is not available.',
      [
        '• Use Chrome for Android (v80+)',
        '• Do not use in-app browsers (Instagram, Facebook, WeChat)',
        '• Do not use Opera Mini or UC Browser',
        '• Samsung Internet may need WebRTC enabled in settings'
      ]
    );
    return;
  }
  // Use Permissions API if available to pre-check state
  if(navigator.permissions){
    try{
      const perm = await navigator.permissions.query({name:'camera'});
      if(perm.state==='denied'){
        showDenied(
          'Camera permission is permanently blocked in your browser.',
          'You previously denied camera access.',
          [
            '1. Tap the 🔒 lock icon in the address bar',
            '2. Tap "Permissions" or "Site settings"',
            '3. Find "Camera" and change it to "Allow"',
            '4. Reload this page'
          ]
        );
        return;
      }
      if(perm.state==='prompt'){
        note.textContent = 'Tap "Enter Experience" — allow camera when prompted';
      } else {
        note.textContent = 'Camera ready · Tap to begin';
      }
      // Listen for future changes
      perm.onchange = ()=>{ if(perm.state==='denied') showDenied('Camera was blocked after the page loaded.','',['Reload and allow camera access when prompted.']); };
    }catch(e){
      note.textContent = 'Camera access required · Tap to begin';
    }
  } else {
    note.textContent = 'Camera access required · Tap to begin';
  }
})();

function showDenied(reason, sub, steps){
  document.getElementById('splash-main').style.display = 'none';
  const panel = document.getElementById('splash-denied');
  panel.style.display = 'flex';
  document.getElementById('denied-reason').innerHTML = `<strong>${reason}</strong>${sub?`<br><span style="opacity:.7">${sub}</span>`:''}`;
  document.getElementById('fix-steps').innerHTML = steps.map(s=>`<div style="padding:2px 0">${s}</div>`).join('');
}

function showCameraError(err){
  let reason, sub, steps;
  if(!err || err.name==='NotAllowedError' || err.name==='PermissionDeniedError'){
    reason = 'Camera permission was denied.';
    sub = 'You tapped "Block" or permission was previously denied.';
    steps = [
      '1. Tap the 🔒 lock / ⓘ icon in the address bar',
      '2. Tap "Permissions" → "Camera" → set to <strong>Allow</strong>',
      '3. Reload this page and tap "Allow" when prompted',
      '',
      'On Android (Chrome):',
      '• Settings → Site Settings → Camera → find this site → Allow',
    ];
  } else if(err.name==='NotFoundError' || err.name==='DevicesNotFoundError'){
    reason = 'No camera was found on this device.';
    sub = '';
    steps = ['• Check that your camera is not covered or disabled','• Try a different browser'];
  } else if(err.name==='NotReadableError' || err.name==='TrackStartError'){
    reason = 'Camera is being used by another app.';
    sub = 'Close WhatsApp, TikTok, Snapchat, or any other camera app.';
    steps = ['1. Close all other apps using the camera','2. Reload this page'];
  } else if(err.name==='OverconstrainedError'){
    reason = 'Camera does not support required settings.';
    sub = 'Trying with lower constraints — use the flip button to switch cameras.';
    steps = ['• Tap the ⟳ flip button in the top bar to try the other camera'];
  } else if(err.name==='SecurityError'){
    reason = 'Camera blocked by browser security policy.';
    sub = 'This usually means the page is not on HTTPS.';
    steps = [
      '• Host this file on HTTPS (GitHub Pages, Netlify, etc.)',
      '• file:// and http:// URLs block camera access'
    ];
  } else {
    reason = 'Camera error: ' + (err ? err.name : 'Unknown');
    sub = err ? err.message : '';
    steps = ['• Reload and try again','• Try Chrome for Android'];
  }
  showDenied(reason, sub, steps);
}

function startPump(){
  if(pumpRunning) return;
  pumpRunning = true;
  async function pump(){
    if(!pumpRunning) return;
    if(vid.readyState>=2 && !vid.paused){
      try{ await handsInstance.send({image:vid}); }catch(e){}
    }
    requestAnimationFrame(pump);
  }
  pump();
}

async function initMediaPipe(){
  handsInstance = new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
  handsInstance.setOptions({maxNumHands:2,modelComplexity:1,minDetectionConfidence:.72,minTrackingConfidence:.72});
  handsInstance.onResults(res=>{
    hands = res.multiHandLandmarks
      ? res.multiHandLandmarks.map((lms,i)=>({landmarks:lms,handedness:res.multiHandedness?.[i]?.label}))
      : [];
    processHands();
    fpsCount++;
    const now=performance.now();
    if(now-lastFpsTime>1000){fps=fpsCount;fpsCount=0;lastFpsTime=now;document.getElementById('fps-chip').textContent=`${fps} fps`;}
  });

  const ok = await startCamera(currentFacingMode);
  if(!ok) return false;

  if(typeof Camera !== 'undefined'){
    try{
      mpCamera = new Camera(vid,{onFrame:async()=>{if(vid.readyState>=2) await handsInstance.send({image:vid})},width:1280,height:720});
      mpCamera.start();
    }catch(e){ startPump(); }
  } else { startPump(); }

  requestAnimationFrame(loop);
  return true;
}

async function flipCamera(){
  const prev = currentFacingMode;
  currentFacingMode = prev==='user'?'environment':'user';
  if(mpCamera){try{mpCamera.stop();}catch(e){} mpCamera=null;}
  pumpRunning = false;
  const ok = await startCamera(currentFacingMode);
  if(!ok){ currentFacingMode=prev; return; }
  if(typeof Camera !== 'undefined'){
    try{
      mpCamera = new Camera(vid,{onFrame:async()=>{if(vid.readyState>=2) await handsInstance.send({image:vid})},width:1280,height:720});
      mpCamera.start();
    }catch(e){ startPump(); }
  } else { startPump(); }
  showToast(currentFacingMode==='environment'?'📷 Rear Cam':'🤳 Front Cam');
}

document.getElementById('cam-flip-btn').addEventListener('click', flipCamera);

function loop(){
  drawMatrix();
  requestAnimationFrame(loop);
}

document.getElementById('enter-btn').addEventListener('click', async ()=>{
  initAudio();
  const btn = document.getElementById('enter-btn');
  btn.textContent = 'Starting…'; btn.disabled = true;
  resize(); setMode('play');
  const ok = await initMediaPipe();
  if(ok){
    // Only hide splash after camera confirmed working
    document.getElementById('splash').classList.add('hide');
    setTimeout(()=>{document.getElementById('splash').style.display='none';},900);
  } else {
    // showCameraError already showed the denied panel; keep splash visible
    btn.textContent = 'Enter Experience'; btn.disabled = false;
  }
});

resize();
setMode('play');
</script>
